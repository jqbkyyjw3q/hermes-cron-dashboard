<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes 定时脚本面板</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Hermes Cron Dashboard</p>
        <h1>每日定时脚本分类看板</h1>
        <p class="sub">把每天跑的 cron 任务按类型整理展示：看状态、看时间、看输出、看脚本用途。</p>
      </div>
      <div class="hero-meta">
        <div class="meta-card"><span>总任务数</span><strong id="totalJobs">-</strong></div>
        <div class="meta-card"><span>最近生成</span><strong id="generatedAt">-</strong></div>
      </div>
    </header>

    <section class="stats" id="stats"></section>

    <section class="toolbar">
      <div id="categoryFilters" class="filters"></div>
      <input id="searchInput" class="search" type="search" placeholder="搜索任务名 / prompt / 状态" />
    </section>

    <section id="groupedJobs" class="groups"></section>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <article>
      <button id="closeDialog" class="close-btn">×</button>
      <div id="detailBody"></div>
    </article>
  </dialog>

  <script src="./assets/dashboard-data.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>

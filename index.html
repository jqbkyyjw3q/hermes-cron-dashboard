<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes 每日信息看板</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Hermes Daily Intelligence Board</p>
        <h1>每日执行结果信息看板</h1>
        <p class="sub">这里展示的是各定时任务执行后的最终信息，不是脚本本身。按类别归档，直接看内容、看摘要、看全文。</p>
      </div>
      <div class="hero-meta">
        <div class="meta-card"><span>信息卡片数</span><strong id="totalJobs">-</strong></div>
        <div class="meta-card"><span>最近生成</span><strong id="generatedAt">-</strong></div>
      </div>
    </header>

    <section class="stats" id="stats"></section>

    <section class="toolbar">
      <div id="categoryFilters" class="filters"></div>
      <input id="searchInput" class="search" type="search" placeholder="搜索标题 / 来源任务 / 摘要 / 内容" />
    </section>

    <section id="groupedJobs" class="groups"></section>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <article>
      <button id="closeDialog" class="close-btn">×</button>
      <div id="detailBody"></div>
    </article>
  </dialog>

  <script src="./assets/dashboard-data.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>

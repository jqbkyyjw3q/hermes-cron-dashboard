<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes 每日信息看板</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Hermes Daily Intelligence Board</p>
        <h1>每日执行结果信息看板</h1>
        <p class="sub">首页先看“今日头条汇总”，下面再按类别看最新内容，并把历史归档一起带上去，方便纵向回看。</p>
      </div>
      <div class="hero-meta">
        <div class="meta-card"><span>今日内容卡片</span><strong id="totalJobs">-</strong></div>
        <div class="meta-card"><span>最近生成</span><strong id="generatedAt">-</strong></div>
      </div>
    </header>

    <section class="stats" id="stats"></section>

    <section class="headline-section group">
      <div class="group-head">
        <h2>今日头条汇总</h2>
        <span>把今天各定时任务的核心结果先汇在首页</span>
      </div>
      <div id="todayHeadlines" class="headline-grid"></div>
    </section>

    <section class="group search-panel">
      <div class="toolbar">
        <div id="categoryFilters" class="filters"></div>
        <input id="searchInput" class="search" type="search" placeholder="全文搜索标题 / 来源任务 / 摘要 / 正文 / 历史归档" />
      </div>
      <div id="searchMeta" class="search-meta"></div>
    </section>

    <section id="searchResultsSection" class="group search-results" hidden>
      <div class="group-head">
        <h2>全文搜索结果</h2>
        <span>按相关度与时间排序，支持直接打开全文</span>
      </div>
      <section id="searchResults" class="groups"></section>
    </section>

    <section class="group">
      <div class="group-head">
        <h2>最新分类内容</h2>
        <span>每个任务当前最新一版结果</span>
      </div>
      <section id="groupedJobs" class="groups"></section>
    </section>

    <section class="group history-wrapper">
      <div class="group-head">
        <h2>历史归档</h2>
        <span>原来的历史数据也已一起带上来</span>
      </div>
      <section id="historySection" class="groups"></section>
    </section>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <article>
      <button id="closeDialog" class="close-btn">×</button>
      <div id="detailBody"></div>
    </article>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/dashboard-data.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全文搜索 - Hermes 每日信息看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body data-page="search">
  <div class="shell">
    <header class="topbar">
      <div class="brand-block">
        <p class="micro-kicker">Hermes</p>
        <strong>Daily Intelligence Board</strong>
      </div>
      <nav class="topbar-nav">
        <a href="index.html">首页</a>
        <a href="today.html">今日内容</a>
        <a class="active" href="search.html">搜索</a>
        <a href="archive.html">历史归档</a>
      </nav>
      <div class="topbar-meta">
        <span class="topbar-chip">今日卡片 <strong id="totalJobs">-</strong></span>
        <span class="topbar-chip">最近生成 <strong id="generatedAt">-</strong></span>
      </div>
    </header>

    <main class="board-layout">
      <section class="section-card">
        <div class="section-head">
          <div>
            <p class="micro-kicker">Search</p>
            <h2>全文搜索</h2>
          </div>
          <span>搜索当前内容与历史归档</span>
        </div>
        <form id="searchForm" class="search-toolbar">
          <input id="searchInput" class="plain-input" type="search" placeholder="输入关键词，例如：翻译 / Trump / 财经" />
          <select id="searchScope" class="plain-select">
            <option value="all">全部内容</option>
            <option value="today">仅今日内容</option>
            <option value="history">仅历史归档</option>
          </select>
          <button type="submit" class="primary-button">搜索</button>
        </form>
        <p id="searchSummary" class="page-summary"></p>
        <div id="searchFilters" class="filters"></div>
      </section>

      <section class="section-card">
        <section id="searchResults" class="groups"></section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/dashboard-data.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>

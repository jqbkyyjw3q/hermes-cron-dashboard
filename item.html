<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>详情 - Hermes 每日信息看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body data-page="item">
  <div class="shell">
    <header class="topbar">
      <div class="brand-block">
        <p class="micro-kicker">Hermes</p>
        <strong>Daily Intelligence Board</strong>
      </div>
      <nav class="topbar-nav">
        <a href="index.html">首页</a>
        <a href="today.html">今日内容</a>
        <a href="search.html">搜索</a>
        <a href="archive.html">历史归档</a>
      </nav>
      <div class="topbar-meta">
        <span class="topbar-chip">今日卡片 <strong id="totalJobs">-</strong></span>
        <span class="topbar-chip">最近生成 <strong id="generatedAt">-</strong></span>
      </div>
    </header>

    <section class="detail-page">
      <div class="detail-nav-bar">
        <a id="backToBoard" class="back-link" href="index.html">← 返回总览</a>
        <div id="detailPager" class="detail-pager"></div>
      </div>
      <article class="detail-layout single-column">
        <section class="detail-content-card detail-article-card">
          <header class="detail-header-block">
            <h1 id="detailTitle">加载中…</h1>
            <div id="detailContext" class="page-summary"></div>
            <div id="detailMeta" class="detail-meta"></div>
            <div id="detailSearchHint" class="detail-search-hint" hidden></div>
          </header>
          <div id="detailBody" class="markdown-body"></div>
        </section>
      </article>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./assets/dashboard-data.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
